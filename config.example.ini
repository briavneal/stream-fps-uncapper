```ini
[General]
; Set the default values for the Valorant FPS Uncapper
enabled=true
; Set to true to enable the FPS uncapper
max_fps=240
; Sets the maximum FPS limit. Common options: 144, 240, etc.
auto_start=true
; Set to true to start the app automatically with Valorant

[Hotkeys]
; Configure hotkeys for various features
toggle_fps_display=F12
; Key to toggle FPS display on and off
increase_fps_limit=NUMPAD0
; Key to increase the FPS limit (if applicable)
decrease_fps_limit=NUMPAD1
; Key to decrease the FPS limit (if applicable)

[Features]
; Enable or disable specific features of the FPS Uncapper
enable_fps_monitor=true
; Show FPS monitor overlay while playing
enable_vsync_toggle=true
; Allows toggling of V-Sync with a hotkey
disable_mouse_acceleration=true
; Disables mouse acceleration for improved aiming

[Display]
; Configure display options for overlays and graphics
overlay_position=top-right
; Position of the FPS overlay on the screen: top-left, top-right, bottom-left, bottom-right
overlay_opacity=0.8
; Opacity of the FPS overlay (0.0 to 1.0)
font_size=14
; Font size of the overlay text
```